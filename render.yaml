# Render Blueprint — provisions the Tixora API as a single web service.
# Connect this repo via Render dashboard → New → Blueprint. Render reads this file
# on every push to main and reconciles the service.
#
# Two env vars use `sync: false`, meaning Render will NOT read them from this file
# and you MUST set them in the dashboard:
#   - DATABASE_URL  → your Neon DB connection string
#   - CORS_ORIGIN   → your Vercel URL once known (e.g. https://tixora.vercel.app)
#
# JWT_SECRET uses `generateValue: true` so Render auto-generates a strong secret
# on first deploy. Rotate it by deleting the var in the dashboard and redeploying.

services:
  - type: web
    name: tixora-api
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: true
    buildFilter:
      paths:
        - Backend/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: BCRYPT_ROUNDS
        value: '12'
